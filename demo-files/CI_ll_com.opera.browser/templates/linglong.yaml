version: "${ll_version}"

package:
  id: com.opera.browser
  name: "Opera"
  version: ${ll_version}
  kind: app
  architecture: ${linyaps_arch}
  description: |
    Opera web browser

base: ${base_id}/${base_version}
runtime: ${runtime_id}/${runtime_version}

buildext:
  apt:
    depends: # 运行时依赖，会包含在最终的应用或运行时中
      - libasound2
      - libatk-bridge2.0-0
      - libatk1.0-0
      - libatspi2.0-0
      - libc6
      - libcairo2
      - libcups2
      - libcurl4
      - libexpat1
      - libgbm1
      - libgcc-s1
      - libglib2.0-0
      - libgtk-3-0
      - libnspr4
      - libnss3
      - libpango-1.0-0
      - libstdc++6
      - libx11-6
      - libx11-xcb1
      - libxcb1
      - libxcomposite1
      - libxcursor1
      - libxdamage1
      - libxext6
      - libxfixes3
      - libxi6
      - libxrandr2
      - libxrender1
      - libxss1
      - libxtst6
      - lsb-release
      - wget
      - xdg-utils

command:
  - "${command}"

build: |
  ##Extract res
  # files/ 映射到 /usr/ 目录
  # binary/ 的内容直接对应 $prefix/ (files/)
  # pak_linyaps.sh 已处理路径转换和软链
  cp -rf /project/binary/* ${prefix}/

  # 复制桌面文件、图标等资源
  cp -rf /project/files_res/* ${prefix}/

  # Add an identity for LLM
  touch ${prefix}/.linyaps_genius
