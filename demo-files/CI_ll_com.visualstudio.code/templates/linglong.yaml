version: "${ll_version}"

package:
  id: com.visualstudio.code
  name: "Visual Studio Code"
  version: ${ll_version}
  kind: app
  architecture: ${linyaps_arch}
  description: |
    Code Editing. Redefined.

base: ${base_id}/${base_version}
runtime: ${runtime_id}/${runtime_version}

buildext:
  apt:
    depends: # 运行时依赖，会包含在最终的应用或运行时中
      - git
      - clang-format
      - libsecret-1-0
      - shfmt
      - golang-go
      - gopls

command:
  - "/opt/apps/com.visualstudio.code/files/bin/code/code"

build: |
  ##Extract res
  mkdir -p ${prefix}/bin/ ${prefix}/share/
  cp -rf /project/binary/* ${prefix}/bin/
  cp -rf /project/files_res/* ${prefix}/